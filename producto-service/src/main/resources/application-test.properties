# 2. Configuración de la Conexión a Laragon (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/db_lovable_test
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. Configuración de Hibernate / JPA
# Cambiamos a 'validate' porque Flyway creará la tabla desde el script SQL
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# 4. Configuración de Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration/producto
spring.flyway.table=flyway_producto

# 5. Configuración para Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html