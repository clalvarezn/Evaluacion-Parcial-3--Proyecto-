# JPA - gestion de base de datos
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Flyway - control de migraciones
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration/pago
spring.flyway.table=flyway_pago
spring.flyway.baseline-on-migrate=true

# Database

spring.datasource.url=jdbc:mysql://localhost:3306/db_pago_service_dev
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
